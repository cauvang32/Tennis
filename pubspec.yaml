name: tennis_pro
description: Tennis Pro - Tennis Ranking & Tournament Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  # Networking
  dio: ^5.8.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  # State Management
  flutter_riverpod: ^3.3.1
  # Routing
  go_router: ^17.2.3
  # Secure Storage
  flutter_secure_storage: ^10.3.1
  # JSON serialization
  json_annotation: ^4.9.0
  # Local Notifications
  flutter_local_notifications: ^21.0.0
  # Utilities
  intl: ^0.20.2
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

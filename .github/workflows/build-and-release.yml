name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      - uses: actions/setup-java@v4
        with:
          java-version: '17' 
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - uses: actions/cache@v4
        with:
          path: /home/runner/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - run: flutter pub get
      - run: touch .env.example
      - run: flutter build apk --debug
      - run: |
          mkdir -p build/app/outputs/final-apks
          # With ABI splits enabled, the universal debug APK is named
          # `app-universal-debug.apk` (it still bundles all 4 ABIs so the
          # emulator install path is unchanged for local testing).
          if [ -f "build/app/outputs/flutter-apk/app-universal-debug.apk" ]; then
            mv build/app/outputs/flutter-apk/app-universal-debug.apk build/app/outputs/final-apks/tennis_app_debug.apk
          else
            mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/final-apks/tennis_app_debug.apk
          fi
          # Clean up per-ABI debug APKs and any leftover signed file.
          rm -f build/app/outputs/flutter-apk/app-*-debug.apk
          if [ -f "build/app/outputs/flutter-apk/app-debug-signed.apk" ]; then
            rm build/app/outputs/flutter-apk/app-debug-signed.apk
          fi
      - run: flutter build apk --release
        continue-on-error: true
      - if: github.event_name != 'pull_request'
        uses: ilharp/sign-android-release@v2
        id: sign_app
        with:
          releaseDir: build/app/outputs/flutter-apk
          signingKey: ${{ secrets.SIGNING_KEY_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
      - if: github.event_name != 'pull_request'
        run: |
          # R8 + ABI splits produce one signed APK per architecture
          # (arm64-v8a, armeabi-v7a, x86_64) plus a universal one.
          # Rename each to tennis_app_<arch>.apk and let the create_release
          # job glob `release-files/*` to pick them all up.
          cd build/app/outputs/flutter-apk
          for apk in *-release-signed.apk; do
            # e.g. app-arm64-v8a-release-signed.apk -> tennis_app_arm64-v8a.apk
            new_name=$(echo "$apk" | sed 's/^app-/tennis_app_/; s/-release-signed//; s/$/.apk/')
            mv "$apk" "../../final-apks/$new_name"
          done
          ls -la ../../final-apks/
      - uses: actions/upload-artifact@v4
        with:
          name: tennis_app_debug
          path: build/app/outputs/final-apks/tennis_app_debug.apk
      - if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tennis_app
          path: build/app/outputs/final-apks/tennis_app.apk

  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4 
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: touch .env.example
      - run: flutter build ios --release --no-codesign
      - run: |
          mkdir -p final-ios
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qr final-ios/tennis_app_ios.ipa Payload
          rm -rf Payload
          cd build/ios/iphoneos
          zip -qr "$GITHUB_WORKSPACE/final-ios/tennis_app_ios.zip" Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: tennis_app_ios
          path: final-ios/

  create_release:
    needs: [build_android, build_ios]
    if: github.event_name == 'push'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true
      - id: tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=build-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release ${{ steps.tag.outputs.tag_name }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
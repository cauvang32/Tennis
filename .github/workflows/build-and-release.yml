name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      - uses: actions/setup-java@v4
        with:
          java-version: '17' 
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - uses: actions/cache@v4
        with:
          path: /home/runner/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - run: flutter pub get
      - run: touch .env.example
      - run: flutter build apk --debug
      - run: |
          mkdir -p build/app/outputs/final-apks
          mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/final-apks/tennis_app_debug.apk
          if [ -f "build/app/outputs/flutter-apk/app-debug-signed.apk" ]; then
            rm build/app/outputs/flutter-apk/app-debug-signed.apk
          fi
      - run: flutter build apk --release
        continue-on-error: true
      - if: github.event_name != 'pull_request'
        uses: ilharp/sign-android-release@v2
        id: sign_app
        with:
          releaseDir: build/app/outputs/flutter-apk
          signingKey: ${{ secrets.SIGNING_KEY_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
      - if: github.event_name != 'pull_request'
        run: |
          mv build/app/outputs/flutter-apk/app-release-signed.apk build/app/outputs/final-apks/tennis_app.apk
      - uses: actions/upload-artifact@v4
        with:
          name: tennis_app_debug
          path: build/app/outputs/final-apks/tennis_app_debug.apk
      - if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tennis_app
          path: build/app/outputs/final-apks/tennis_app.apk

  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4 
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: touch .env.example
      - run: flutter build ios --release --no-codesign
      - run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -qr tennis_app_ios.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: tennis_app_ios
          path: tennis_app_ios.ipa

  create_release:
    needs: [build_android, build_ios]
    if: github.event_name == 'push'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true
      - id: tag
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=build-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release ${{ steps.tag.outputs.tag_name }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}